<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Groove Garage</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0f0f14;
  --surface: #1a1a24;
  --border:  #2e2e3f;
  --gold:    #c9952a;
  --text:    #e8e8f0;
  --dim:     #888899;
  --green:   #3ac97a;
  --radius:  10px;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 20px 20px 16px;
  text-align: center;
}
.header-name {
  font-family: Georgia, serif;
  font-size: 26px;
  font-weight: bold;
  color: var(--gold);
  letter-spacing: -0.5px;
}
.header-tag {
  font-size: 12px;
  color: var(--dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 3px;
}
.event-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(58,201,122,0.12);
  border: 1px solid rgba(58,201,122,0.3);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  color: var(--green);
  margin-top: 10px;
}
.event-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
}

/* SEARCH */
.search-wrap {
  padding: 16px 16px 8px;
}
.search-box {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.search-box input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 16px;
  padding: 12px 16px;
  -webkit-appearance: none;
}
.search-box input:focus {
  outline: none;
  border-color: var(--gold);
}
.search-box button {
  background: var(--gold);
  border: none;
  border-radius: var(--radius);
  color: #1a1008;
  font-size: 14px;
  font-weight: 700;
  padding: 12px 20px;
  cursor: pointer;
  white-space: nowrap;
}
.filter-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
.filter-chip {
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--dim);
  font-size: 12px;
  padding: 5px 14px;
  cursor: pointer;
  white-space: nowrap;
  -webkit-appearance: none;
}
.filter-chip.active {
  background: rgba(201,149,42,0.15);
  border-color: var(--gold);
  color: var(--gold);
}

/* RESULTS */
.results-header {
  padding: 12px 16px 6px;
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.result-card {
  margin: 0 12px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.result-card.here-today {
  border-color: rgba(58,201,122,0.4);
}
.result-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}
.result-artist {
  font-size: 15px;
  font-weight: 700;
  line-height: 1.2;
}
.result-title {
  font-size: 13px;
  color: var(--dim);
  margin-top: 3px;
  line-height: 1.3;
}
.result-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 8px;
  flex-wrap: wrap;
}
.genre-tag {
  font-size: 11px;
  color: var(--dim);
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
  padding: 2px 8px;
}
.here-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(58,201,122,0.15);
  border: 1px solid rgba(58,201,122,0.35);
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--green);
  padding: 2px 9px;
}
.double-badge {
  font-size: 10px;
  background: rgba(201,149,42,0.1);
  color: var(--gold);
  border-radius: 4px;
  padding: 2px 7px;
}

/* EMPTY / LOADING */
.state-msg {
  text-align: center;
  padding: 60px 24px 40px;
  color: var(--dim);
}
.state-icon { font-size: 48px; margin-bottom: 14px; }
.state-text { font-size: 15px; line-height: 1.5; }

.spinner {
  display: inline-block;
  width: 28px; height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* FOOTER */
.footer {
  text-align: center;
  padding: 32px 20px 16px;
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-name">The Groove Garage</div>
  <div class="header-tag">Curated CDs · Northern Virginia</div>
  <div id="eventPill" style="display:none;">
    <div class="event-pill">
      <div class="event-dot"></div>
      <span id="eventPillText">Here today</span>
    </div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <input type="search" id="searchInput" placeholder="Artist, title, or genre…"
           autocomplete="off" autocorrect="off" spellcheck="false"
           onkeydown="if(event.key==='Enter'){event.preventDefault();doSearch()}"
           oninput="debounce()">
    <button onclick="doSearch()">Search</button>
  </div>
  <div class="filter-row" id="filterRow">
    <button class="filter-chip active" onclick="setFilter('')">All</button>
    <button class="filter-chip" onclick="setFilter('Classic Rock')">Classic Rock</button>
    <button class="filter-chip" onclick="setFilter('Alternative & Modern Rock')">Alternative</button>
    <button class="filter-chip" onclick="setFilter('Hard Rock & Metal')">Hard Rock</button>
    <button class="filter-chip" onclick="setFilter('Folk & Singer-Songwriter')">Folk</button>
    <button class="filter-chip" onclick="setFilter('Pop')">Pop</button>
    <button class="filter-chip" onclick="setFilter('Blues, Soul & R&B')">Blues & Soul</button>
    <button class="filter-chip" onclick="setFilter('Country & Americana')">Country</button>
    <button class="filter-chip" onclick="setFilter('Soundtracks & Compilations')">Soundtracks</button>
  </div>
</div>

<div id="resultsHeader" class="results-header" style="display:none;"></div>
<div id="results"></div>

<div class="footer">
  The Groove Garage · Northern Virginia<br>
  Venmo <strong id="footerVenmo">@Bradleyjbrenda</strong>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlV39-rraFAIklwGv3K0u3FZj28v2dAYMZN2FrRbHg6japGuzrS-xpXCfDE8Q3yxWN/exec';

let currentFilter = '';
let searchTimer   = null;
let currentEvent  = '';

async function api(action, data) {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action, ...data }),
    });
    return await res.json();
  } catch(e) { return { error: e.toString() }; }
}

// Check for active event on load
async function init() {
  const stats = await api('getStats');
  if (stats && stats.eventName) {
    currentEvent = stats.eventName;
    document.getElementById('eventPill').style.display = 'block';
    document.getElementById('eventPillText').textContent = 'Here today at ' + stats.eventName;
  }
}

function debounce() {
  clearTimeout(searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  if (q.length >= 2) searchTimer = setTimeout(doSearch, 400);
}

function setFilter(genre) {
  currentFilter = genre;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  if (genre) {
    document.getElementById('searchInput').value = '';
    doSearch();
  } else {
    showHome();
  }
}

function showHome() {
  document.getElementById('resultsHeader').style.display = 'none';
  document.getElementById('results').innerHTML = `
    <div class="state-msg">
      <div class="state-icon">🎵</div>
      <div class="state-text">Search by artist or title,<br>or browse a genre above</div>
    </div>`;
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q && !currentFilter) { showHome(); return; }

  document.getElementById('results').innerHTML =
    '<div class="state-msg"><div class="spinner"></div><div class="state-text">Searching…</div></div>';
  document.getElementById('resultsHeader').style.display = 'none';

  const results = await api('search', {
    query:     q || currentFilter,
    field:     !q && currentFilter ? 'genre' : 'all',
    status:    'Active',
    eventOnly: false,
  });

  if (!Array.isArray(results)) {
    document.getElementById('results').innerHTML =
      '<div class="state-msg"><div class="state-icon">⚠️</div><div class="state-text">Search unavailable right now</div></div>';
    return;
  }

  // Sort: here-today first, then alphabetical by artist
  results.sort((a, b) => {
    if (a.atEvent === 'Yes' && b.atEvent !== 'Yes') return -1;
    if (b.atEvent === 'Yes' && a.atEvent !== 'Yes') return 1;
    return a.artist.localeCompare(b.artist);
  });

  const hdr = document.getElementById('resultsHeader');
  hdr.style.display = 'block';

  const hereCount = results.filter(r => r.atEvent === 'Yes').length;
  if (hereCount > 0) {
    hdr.textContent = `${results.length} title${results.length!==1?'s':''} found · ${hereCount} here today`;
  } else {
    hdr.textContent = `${results.length} title${results.length!==1?'s':''} found`;
  }

  if (results.length === 0) {
    document.getElementById('results').innerHTML = `
      <div class="state-msg">
        <div class="state-icon">🔍</div>
        <div class="state-text">No results found for<br><strong>${esc(q||currentFilter)}</strong></div>
      </div>`;
    return;
  }

  document.getElementById('results').innerHTML = results.slice(0, 60).map(r => {
    const here = r.atEvent === 'Yes';
    return `
      <div class="result-card ${here ? 'here-today' : ''}">
        <div class="result-top">
          <div>
            <div class="result-artist">${esc(r.artist)}</div>
            <div class="result-title">${esc(r.title)}</div>
          </div>
          ${here ? '<div class="here-badge">✓ Here today</div>' : ''}
        </div>
        <div class="result-meta">
          <span class="genre-tag">${esc(r.genre)}</span>
          ${r.year ? `<span style="font-size:11px;color:var(--dim);">${r.year}</span>` : ''}
          ${r.doubleCD === 'Yes' ? '<span class="double-badge">2xCD</span>' : ''}
        </div>
      </div>`;
  }).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

showHome();
init();
</script>
</body>
</html>
